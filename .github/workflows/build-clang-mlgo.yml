name: Build Clang Minimal MLGO

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_DIR: C:\sccache
      BUILD_DIR: C:\llvm-build
      INSTALL_DIR: C:\llvm-install
    steps:
      - name: Log disk space at start
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          fetch-depth: 1
          sparse-checkout: |
            llvm
            clang
            lld
            cmake
            third-party

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: v0.10.0
        continue-on-error: true

      - name: Patch LLD for Windows-only linking
        shell: powershell
        run: |
          $path = Join-Path $env:GITHUB_WORKSPACE 'lld\CMakeLists.txt'
          $content = Get-Content $path
          $content = $content | Where-Object {
            $trimmed = $_.Trim()
            $trimmed -notin @('add_subdirectory(ELF)', 'add_subdirectory(MachO)', 'add_subdirectory(wasm)')
          }
          Set-Content -Path $path -Value ($content -join "`n") -Encoding utf8

          $toolPath = Join-Path $env:GITHUB_WORKSPACE 'lld\tools\lld\CMakeLists.txt'
          $toolContent = Get-Content $toolPath
          $toolContent = $toolContent | Where-Object {
            $trimmed = $_.Trim()
            $trimmed -notin @('lldELF', 'lldMachO', 'lldWasm')
          }
          Set-Content -Path $toolPath -Value ($toolContent -join "`n") -Encoding utf8

          if (Select-String -Path $toolPath -Pattern 'lldELF|lldMachO|lldWasm' -Quiet) {
            throw 'LLD backend libraries still present after patch'
          }

      - name: Log disk space before configure
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Configure
        shell: cmd
        run: |
          cmake -G "Ninja" ^
            -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_ASM_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_INSTALL_PREFIX=%INSTALL_DIR% ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DLLVM_TARGETS_TO_BUILD="X86" ^
            -DLLVM_ENABLE_MLGO=ON ^
            -DLLVM_INSTALL_TOOLCHAIN_ONLY=ON ^
            -DLLVM_BUILD_TESTS=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_BUILD_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_INCLUDE_UTILS=OFF ^
            -DLLVM_ENABLE_BINDINGS=OFF ^
            -DCLANG_ENABLE_ARCMT=OFF ^
            -DCLANG_ENABLE_STATIC_ANALYZER=OFF ^
            -DLLVM_ENABLE_TERMINFO=OFF ^
            -DLLVM_ENABLE_ZLIB=OFF ^
            -DLLVM_ENABLE_ZSTD=OFF ^
            -DLLVM_ENABLE_LIBXML2=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            -DLLVM_PARALLEL_COMPILE_JOBS=4 ^
            -DLLVM_PARALLEL_LINK_JOBS=1 ^
            -S %GITHUB_WORKSPACE%\llvm -B %BUILD_DIR%

      - name: Log disk space after configure
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Build
        shell: cmd
        run: ninja -C %BUILD_DIR% -j4 clang lld

      - name: Log disk space after build
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Install
        shell: cmd
        run: ninja -C %BUILD_DIR% install

      - name: Log disk space after install
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Verify Windows linker
        shell: cmd
        run: |
          set "PATH=%INSTALL_DIR%\bin;%PATH%"
          where lld-link.exe
          where clang-cl.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clang-mlgo-windows
          path: C:\llvm-install
