name: Build Clang Minimal MLGO

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          fetch-depth: 1
          sparse-checkout: |
            llvm
            clang
            lld
            cmake
            third-party

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: v0.10.0

      - name: Patch LLD for Windows-only linking
        shell: powershell
        run: |
          $path = Join-Path $env:GITHUB_WORKSPACE 'lld\CMakeLists.txt'
          $content = Get-Content $path -Raw
          $content = $content -replace '(?m)^\s*add_subdirectory\(ELF\)\s*$', ''
          $content = $content -replace '(?m)^\s*add_subdirectory\(MachO\)\s*$', ''
          $content = $content -replace '(?m)^\s*add_subdirectory\(wasm\)\s*$', ''
          Set-Content -Path $path -Value $content -NoNewline

      - name: Show disk space before build
        shell: powershell
        run: Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      - name: Configure
        shell: cmd
        run: |
          cmake -G "Ninja" ^
            -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_INSTALL_PREFIX=%CD%\install ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DLLVM_TARGETS_TO_BUILD="X86" ^
            -DLLVM_ENABLE_MLGO=ON ^
            -DLLVM_INSTALL_TOOLCHAIN_ONLY=ON ^
            -DLLVM_BUILD_TESTS=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_BUILD_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_INCLUDE_UTILS=OFF ^
            -DLLVM_ENABLE_BINDINGS=OFF ^
            -DCLANG_ENABLE_ARCMT=OFF ^
            -DCLANG_ENABLE_STATIC_ANALYZER=OFF ^
            -DLLVM_ENABLE_TERMINFO=OFF ^
            -DLLVM_ENABLE_ZLIB=OFF ^
            -DLLVM_ENABLE_ZSTD=OFF ^
            -DLLVM_ENABLE_LIBXML2=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            -DLLVM_PARALLEL_COMPILE_JOBS=4 ^
            -DLLVM_PARALLEL_LINK_JOBS=1 ^
            -S llvm -B build

      - name: Build
        shell: cmd
        run: ninja -C build -j4 clang lld

      - name: Install
        shell: cmd
        run: ninja -C build install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clang-mlgo-windows
          path: install
