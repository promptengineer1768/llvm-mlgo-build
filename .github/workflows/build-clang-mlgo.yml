name: Build Clang Minimal MLGO

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_DIR: C:\sccache
      BUILD_DIR: C:\llvm-build
      INSTALL_DIR: C:\llvm-install
      MODEL_DIR: C:\mlgo-model\inlining-Oz-v1.2\saved_model
    steps:
      - name: Log disk space at start
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          fetch-depth: 1
          sparse-checkout: |
            llvm
            clang
            lld
            cmake
            third-party

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: v0.10.0
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TensorFlow (AOT compiler)
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install tensorflow==2.15.0

      - name: Populate missing TensorFlow headers (xla/tsl)
        shell: powershell
        run: |
          $tfRoot = python -c "import tensorflow as tf, os; print(os.path.dirname(tf.__file__))"
          $tfInclude = Join-Path $tfRoot "include"
          if (-not (Test-Path $tfInclude)) {
            throw "TensorFlow include dir not found at $tfInclude"
          }
          New-Item -ItemType Directory -Force -Path C:\mlgo-model | Out-Null
          $srcZip = "C:\mlgo-model\tf-src.zip"
          $srcRoot = "C:\mlgo-model\tf-src"
          Invoke-WebRequest -Uri "https://github.com/tensorflow/tensorflow/archive/refs/tags/v2.15.0.zip" -OutFile $srcZip
          Expand-Archive -Path $srcZip -DestinationPath $srcRoot -Force
          $tfSrc = Join-Path $srcRoot "tensorflow-2.15.0"
          $xlaHeader = Get-ChildItem -Recurse -Path $tfSrc -Filter cpu_function_runtime.h | Select-Object -First 1
          if (-not $xlaHeader) {
            throw "xla/cpu_function_runtime.h not found in TensorFlow source"
          }
          $xlaDir = Split-Path $xlaHeader.FullName -Parent
          Copy-Item -Recurse -Force $xlaDir (Join-Path $tfInclude "xla")

          $tslHeader = Get-ChildItem -Recurse -Path $tfSrc -Filter eigen_contraction_kernel.h | Select-Object -First 1
          if (-not $tslHeader) {
            throw "tsl/framework/contraction/eigen_contraction_kernel.h not found in TensorFlow source"
          }
          $tslDir = Split-Path (Split-Path (Split-Path $tslHeader.FullName -Parent) -Parent) -Parent
          Copy-Item -Recurse -Force $tslDir (Join-Path $tfInclude "tsl")

      - name: Download MLGO inliner model
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\mlgo-model | Out-Null
          $zipPath = "C:\mlgo-model\saved_model.zip"
          Invoke-WebRequest -Uri "https://github.com/google/ml-compiler-opt/releases/download/inlining-Oz-v1.2/saved_model.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "C:\mlgo-model\inlining-Oz-v1.2" -Force

      - name: Patch LLD for Windows-only linking
        shell: powershell
        run: |
          $path = Join-Path $env:GITHUB_WORKSPACE 'lld\CMakeLists.txt'
          $content = Get-Content $path
          $content = $content | Where-Object {
            $trimmed = $_.Trim()
            $trimmed -notin @('add_subdirectory(ELF)', 'add_subdirectory(MachO)', 'add_subdirectory(wasm)')
          }
          Set-Content -Path $path -Value ($content -join "`n") -Encoding utf8

          $toolPath = Join-Path $env:GITHUB_WORKSPACE 'lld\tools\lld\CMakeLists.txt'
          $toolContent = Get-Content $toolPath
          $toolContent = $toolContent | Where-Object {
            $trimmed = $_.Trim()
            $trimmed -notin @('lldELF', 'lldMachO', 'lldWasm')
          }
          Set-Content -Path $toolPath -Value ($toolContent -join "`n") -Encoding utf8

          if (Select-String -Path $toolPath -Pattern 'lldELF|lldMachO|lldWasm' -Quiet) {
            throw 'LLD backend libraries still present after patch'
          }

          $driverPath = Join-Path $env:GITHUB_WORKSPACE 'lld\include\lld\Common\Driver.h'
          $driverContent = Get-Content $driverPath -Raw
          $driverReplacement = @(
            '#define LLD_ALL_DRIVERS                                                        \'
            '  {                                                                            \'
            '    {lld::WinLink, &lld::coff::link}, {lld::MinGW, &lld::mingw::link}         \'
            '  }'
            '#endif'
          ) -join "`n"
          $driverContent = [regex]::Replace($driverContent, '(?s)#define LLD_ALL_DRIVERS.*?#endif', $driverReplacement)
          Set-Content -Path $driverPath -Value $driverContent -Encoding utf8

          if (Select-String -Path $driverPath -Pattern 'lld::elf::link|lld::macho::link|lld::wasm::link' -Quiet) {
            throw 'LLD driver table still includes disabled backends'
          }

          $lldCppPath = Join-Path $env:GITHUB_WORKSPACE 'lld\tools\lld\lld.cpp'
          $lldCppContent = Get-Content $lldCppPath
          $lldCppContent = $lldCppContent | Where-Object {
            $trimmed = $_.Trim()
            $trimmed -notin @('LLD_HAS_DRIVER(elf)', 'LLD_HAS_DRIVER(macho)', 'LLD_HAS_DRIVER(wasm)')
          }
          Set-Content -Path $lldCppPath -Value ($lldCppContent -join "`n") -Encoding utf8

          if (Select-String -Path $lldCppPath -Pattern 'LLD_HAS_DRIVER\(elf\)|LLD_HAS_DRIVER\(macho\)|LLD_HAS_DRIVER\(wasm\)' -Quiet) {
            throw 'LLD dispatcher still declares disabled backends'
          }

      - name: Log disk space before configure
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Configure
        shell: cmd
        run: |
          for /f %%i in ('python -c "import tensorflow as tf, os; print(os.path.dirname(tf.__file__))"') do set "TF_PIP=%%i"
          cmake -G "Ninja" ^
            -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_ASM_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_INSTALL_PREFIX=%INSTALL_DIR% ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DLLVM_TARGETS_TO_BUILD="X86" ^
            -DLLVM_ENABLE_MLGO=ON ^
            -DTENSORFLOW_AOT_PATH=%TF_PIP% ^
            -DLLVM_INLINER_MODEL_PATH=%MODEL_DIR% ^
            -DLLVM_INSTALL_TOOLCHAIN_ONLY=ON ^
            -DLLVM_BUILD_TESTS=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_BUILD_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_INCLUDE_UTILS=OFF ^
            -DLLVM_ENABLE_BINDINGS=OFF ^
            -DCLANG_ENABLE_ARCMT=OFF ^
            -DCLANG_ENABLE_STATIC_ANALYZER=OFF ^
            -DLLVM_ENABLE_TERMINFO=OFF ^
            -DLLVM_ENABLE_ZLIB=OFF ^
            -DLLVM_ENABLE_ZSTD=OFF ^
            -DLLVM_ENABLE_LIBXML2=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            -DLLVM_PARALLEL_COMPILE_JOBS=4 ^
            -DLLVM_PARALLEL_LINK_JOBS=1 ^
            -S %GITHUB_WORKSPACE%\llvm -B %BUILD_DIR%

      - name: Log disk space after configure
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Build
        shell: cmd
        run: ninja -C %BUILD_DIR% -j4 clang lld

      - name: Log disk space after build
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Install
        shell: cmd
        run: ninja -C %BUILD_DIR% install

      - name: Log disk space after install
        shell: powershell
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | ForEach-Object {
            "{0}: Free={1:N2} GiB Used={2:N2} GiB Root={3}" -f $_.Name, ($_.Free / 1GB), ($_.Used / 1GB), $_.Root
          }

      - name: Verify Windows linker
        shell: cmd
        run: |
          set "PATH=%INSTALL_DIR%\bin;%PATH%"
          where lld-link.exe
          where clang-cl.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clang-mlgo-windows
          path: C:\llvm-install
